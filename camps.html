<!DOCTYPE html>
<html>
<head>

<title>Blood Donation Camps</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f8f9fa;
}

h2{
color:#dc3545;
}

table thead{
background:#dc3545;
color:white;
}

table tbody tr:hover{
background:#ffe6e6;
}

</style>

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">🩸 Upcoming Blood Donation Camps</h2>

<table class="table table-bordered table-hover shadow">

<thead>
<tr>
<th>#</th>
<th>Camp Name</th>
<th>Date</th>
<th>Location</th>
<th>Description</th>
</tr>
</thead>

<tbody>

{% for camp in camps %}

<tr>

<td>{{ loop.index }}</td>

<td><b>{{ camp[1] }}</b></td>

<td>{{ camp[2] }}</td>

<td>{{ camp[3] }}</td>

<td>{{ camp[4] }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
