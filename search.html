<!DOCTYPE html>

<html>
<head>
<title>Find Blood Donor</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

<h2 class="text-center text-danger">Find Blood Donor</h2>

<form method="POST" class="row mt-4">

<div class="col-md-4">
<select name="blood" class="form-control">
<option>Select Blood Group</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>O+</option>
<option>O-</option>
<option>AB+</option>
<option>AB-</option>
</select>
</div>

<div class="col-md-4">
<input type="text" name="location" class="form-control" placeholder="Enter City">
</div>

<div class="col-md-4">
<button class="btn btn-danger w-100">Search</button>
</div>

</form>

<hr>

{% if donors %}

<table class="table table-bordered table-striped">

<tr>
<th>Name</th>
<th>Blood Group</th>
<th>Phone</th>
<th>Location</th>
</tr>

{% for d in donors %}

<tr>
<td>{{d[1]}}</td>
<td>{{d[4]}}</td>
<td>{{d[3]}}</td>
<td>{{d[5]}}</td>
</tr>
{% endfor %}

</table>

{% else %}

<div class="alert alert-warning text-center">
No donor found with this blood group in this location.
</div>

{% endif %}

</div>

</body>
</html>
