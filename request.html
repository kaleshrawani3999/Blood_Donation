<!DOCTYPE html>

<html>
<head>
<title>Emergency Blood Request</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<div class="row justify-content-center">
<div class="col-md-6">

<div class="card shadow">

<div class="card-header bg-danger text-white text-center">
<h3>Emergency Blood Request</h3>
</div>

<div class="card-body">

<form method="POST">

<input type="text" name="name" class="form-control mb-3" placeholder="Patient Name">

<select name="blood" class="form-control mb-3">

<option>Select Blood Group</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>O+</option>
<option>O-</option>
<option>AB+</option>
<option>AB-</option>

</select>

<input type="text" name="hospital" class="form-control mb-3" placeholder="Hospital Name">

<input type="text" name="contact" class="form-control mb-3" placeholder="Contact Number">

<input type="text" name="location" class="form-control mb-3" placeholder="City">
<label>Priority Level</label>

<select name="priority" required>

<option value="Normal">Normal</option>
<option value="Urgent">Urgent</option>
<option value="Critical">Critical</option>

</select>

<button class="btn btn-danger w-100">Send Request</button>

</form>
<div class="alert alert-success">
Your blood request has been sent. Admin will confirm soon.
</div>
</div>

</div>

</div>
</div>

</div>

</body>
</html>
