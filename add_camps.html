<!DOCTYPE html>
<html>
<head>

<title>Add Blood Camp</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2 class="text-danger">Add Blood Donation Camp</h2>

<form method="POST">

<div class="mb-3">
<label>Camp Name</label>
<input type="text" name="camp_name" class="form-control" required>
</div>

<div class="mb-3">
<label>Date</label>
<input type="date" name="camp_date" class="form-control" required>
</div>

<div class="mb-3">
<label>Location</label>
<input type="text" name="location" class="form-control" required>
</div>

<div class="mb-3">
<label>Description</label>
<textarea name="description" class="form-control"></textarea>
</div>

<button class="btn btn-danger">Create Camp</button>

</form>

</div>


</body>
</html>
