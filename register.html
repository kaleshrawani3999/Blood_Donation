<!DOCTYPE html>

<html>
<head>
<title>Become a Donor</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
<div class="row justify-content-center">
<div class="col-md-6">

<div class="card shadow">
<div class="card-header bg-danger text-white text-center">
<h3>Become a Blood Donor</h3>
</div>

<div class="card-body">

<form method="POST">

<input type="text" name="name" class="form-control mb-3" placeholder="Full Name" required>

<input type="email" name="email" class="form-control mb-3" placeholder="Email">

<input type="text" name="phone" class="form-control mb-3" placeholder="Phone Number">

<select name="blood" class="form-control mb-3">

<option value="">Select Blood Group</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>O+</option>
<option>O-</option>
<option>AB+</option>
<option>AB-</option>

</select>

<input type="text" name="location" class="form-control mb-3" placeholder="City">

<input type="password" name="password" class="form-control mb-3" placeholder="Password">

<button class="btn btn-danger w-100">Register</button>

</form>
<script>

function getLocation() {

navigator.geolocation.getCurrentPosition(function(position){

document.getElementById("lat").value = position.coords.latitude;
document.getElementById("lon").value = position.coords.longitude;

});

}

</script>


</div>
</div>

</div>
</div>
</div>

</body>
</html>
